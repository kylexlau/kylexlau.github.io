# Redirect all kylexlau.github.io pages to blog.xlau.uk (Cloudflare Pages)
name: Deploy redirect site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build redirect site
        run: |
          mkdir -p public

          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://blog.xlau.uk/">
            <link rel="canonical" href="https://blog.xlau.uk/">
            <script>window.location.replace('https://blog.xlau.uk/');</script>
          </head>
          <body>Redirecting to <a href="https://blog.xlau.uk/">blog.xlau.uk</a></body>
          </html>
          EOF

          cat > public/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <script>
              var target = 'https://blog.xlau.uk' +
                window.location.pathname +
                window.location.search +
                window.location.hash;
              window.location.replace(target);
            </script>
          </head>
          <body>Redirecting to <a href="https://blog.xlau.uk/">blog.xlau.uk</a></body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
